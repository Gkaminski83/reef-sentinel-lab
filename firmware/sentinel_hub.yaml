# ============================================================
# Reef Sentinel Lab - Sentinel Hub (Module 1)
# ESPHome firmware v1.1 (no MQTT)
# ============================================================
# Communication model:
# - Hub provides AP + STA networking
# - Chem/Monitor reports to Home Assistant via native ESPHome API
# - Hub reads Chem/Monitor entities from Home Assistant (no MQTT broker)
# ============================================================

esphome:
  name: sentinel-hub
  build_path: C:/esphome-build/hub
  friendly_name: "Sentinel Hub"
  comment: "Reef Sentinel Lab - Module 1 / Direct HTTP bridge"
  on_boot:
    priority: -100
    then:
      - logger.log: "Sentinel Hub booting..."
      - script.execute: update_oled

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
  level: INFO
  baud_rate: 115200

ota:
  - platform: esphome
    password: !secret ota_password

api:
  encryption:
    key: !secret api_encryption_key

wifi:
  # STA - home network (internet + Home Assistant)
  ssid: !secret wifi_home_ssid
  password: !secret wifi_home_password

  # AP - local network for modules
  ap:
    ssid: "SentinelHub"
    password: !secret wifi_ap_password
    manual_ip:
      static_ip: 10.42.0.1
      gateway: 10.42.0.1
      subnet: 255.255.255.0

  power_save_mode: none

captive_portal:

web_server:
  port: 80
  local: true
  version: 3

i2c:
  sda: GPIO21
  scl: GPIO22
  scan: true
  frequency: 400kHz

spi:
  clk_pin: GPIO18
  mosi_pin: GPIO23
  miso_pin: GPIO19

# Optional SD card section kept commented
# sd_mmc_card:
#   cs_pin: GPIO5
#   id: sd_card

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    id: oled_display
    auto_clear_enabled: true
    lambda: |-
      char ph_buf[8];
      char kh_buf[8];
      char t_buf[8];
      char ec_buf[8];
      if (isnan(id(ph_value).state)) snprintf(ph_buf, sizeof(ph_buf), "--");
      else snprintf(ph_buf, sizeof(ph_buf), "%.2f", id(ph_value).state);
      if (isnan(id(kh_value).state)) snprintf(kh_buf, sizeof(kh_buf), "--");
      else snprintf(kh_buf, sizeof(kh_buf), "%.1f", id(kh_value).state);
      if (isnan(id(temp_aquarium).state)) snprintf(t_buf, sizeof(t_buf), "--");
      else snprintf(t_buf, sizeof(t_buf), "%.1f", id(temp_aquarium).state);
      if (isnan(id(ec_value).state)) snprintf(ec_buf, sizeof(ec_buf), "--");
      else snprintf(ec_buf, sizeof(ec_buf), "%.0f", id(ec_value).state);
      it.printf(0, 0, id(font_small), "Sentinel Hub");
      it.printf(0, 12, id(font_small), "IP: %s", id(hub_ip_address).state.c_str());
      it.printf(0, 24, id(font_small), "WiFi: %.0f dBm", id(hub_wifi_signal).state);
      it.printf(0, 36, id(font_small), "pH:%s KH:%s", ph_buf, kh_buf);
      it.printf(0, 48, id(font_small), "T:%s EC:%s", t_buf, ec_buf);

font:
  - file: "gfonts://Roboto Mono"
    id: font_small
    size: 10

status_led:
  pin:
    number: GPIO2
    inverted: false

sensor:
  # Data ingested from modules via HTTP -> web_server REST /number/<id>/set?value=...
  - platform: template
    name: "pH"
    id: ph_value
    lambda: |-
      return id(chem_ph).state;
    update_interval: 30s

  - platform: template
    name: "KH"
    id: kh_value
    lambda: |-
      return id(chem_kh).state;
    update_interval: 30s

  - platform: template
    name: "Temperatura Akwarium"
    id: temp_aquarium
    lambda: |-
      return id(chem_temp_aquarium).state;
    update_interval: 30s

  - platform: template
    name: "Temperatura Sump"
    id: temp_sump
    lambda: |-
      return id(chem_temp_sump).state;
    update_interval: 30s

  - platform: template
    name: "Temperatura Komora"
    id: temp_chamber
    lambda: |-
      return id(chem_temp_chamber).state;
    update_interval: 30s

  - platform: template
    name: "EC Zasolenie"
    id: ec_value
    lambda: |-
      return id(chem_ec).state;
    update_interval: 30s

  - platform: wifi_signal
    name: "Hub WiFi Signal"
    id: hub_wifi_signal
    update_interval: 60s
    unit_of_measurement: "dBm"
    device_class: signal_strength
    state_class: measurement

  - platform: uptime
    name: "Hub Uptime"
    update_interval: 60s
    unit_of_measurement: "s"

binary_sensor:
  - platform: status
    name: "Hub Status"

  - platform: template
    name: "Test KH Aktywny"
    id: kh_test_active
    lambda: |-
      return id(chem_kh_test_active).state > 0.5f;

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "Hub IP Address"
      id: hub_ip_address
    ssid:
      name: "Hub WiFi SSID"

  - platform: template
    name: "Ostatni Test KH"
    id: last_kh_result
    lambda: |-
      char buf[32];
      if (isnan(id(kh_value).state)) {
        return {"brak danych"};
      }
      snprintf(buf, sizeof(buf), "%.1f dKH", id(kh_value).state);
      return {buf};

number:
  - platform: template
    name: "chem_ph"
    id: chem_ph
    optimistic: true
    restore_value: true
    min_value: -1
    max_value: 14
    step: 0.01

  - platform: template
    name: "chem_kh"
    id: chem_kh
    optimistic: true
    restore_value: true
    min_value: -1
    max_value: 25
    step: 0.1

  - platform: template
    name: "chem_temp_aquarium"
    id: chem_temp_aquarium
    optimistic: true
    restore_value: true
    min_value: -20
    max_value: 80
    step: 0.1

  - platform: template
    name: "chem_temp_sump"
    id: chem_temp_sump
    optimistic: true
    restore_value: true
    min_value: -20
    max_value: 80
    step: 0.1

  - platform: template
    name: "chem_temp_chamber"
    id: chem_temp_chamber
    optimistic: true
    restore_value: true
    min_value: -20
    max_value: 80
    step: 0.1

  - platform: template
    name: "chem_ec"
    id: chem_ec
    optimistic: true
    restore_value: true
    min_value: -1
    max_value: 100000
    step: 1

  - platform: template
    name: "chem_kh_test_active"
    id: chem_kh_test_active
    optimistic: true
    restore_value: true
    min_value: 0
    max_value: 1
    step: 1

  # Hub-configurable settings pushed to Chem
  - platform: template
    name: "chem_publish_interval_s"
    id: chem_publish_interval_s
    optimistic: true
    restore_value: true
    min_value: 10
    max_value: 3600
    step: 10
    initial_value: 30

  - platform: template
    name: "chem_kh_interval_h"
    id: chem_kh_interval_h
    optimistic: true
    restore_value: true
    min_value: 0
    max_value: 24
    step: 1
    initial_value: 0

  - platform: template
    name: "chem_ph_cal_v4"
    id: chem_ph_cal_v4
    optimistic: true
    restore_value: true
    min_value: 0
    max_value: 4
    step: 0.001
    initial_value: 2.03

  - platform: template
    name: "chem_ph_cal_v7"
    id: chem_ph_cal_v7
    optimistic: true
    restore_value: true
    min_value: 0
    max_value: 4
    step: 0.001
    initial_value: 2.50

  - platform: template
    name: "chem_ph_cal_liquid1_ph"
    id: chem_ph_cal_liquid1_ph
    optimistic: true
    restore_value: true
    min_value: 0
    max_value: 14
    step: 0.01
    initial_value: 4.00

  - platform: template
    name: "chem_ph_cal_liquid2_ph"
    id: chem_ph_cal_liquid2_ph
    optimistic: true
    restore_value: true
    min_value: 0
    max_value: 14
    step: 0.01
    initial_value: 7.00

  - platform: template
    name: "chem_pump_cal_duration_s"
    id: chem_pump_cal_duration_s
    optimistic: true
    restore_value: true
    min_value: 1
    max_value: 120
    step: 1
    initial_value: 30

  - platform: template
    name: "chem_pump_hcl_ml_per_pulse"
    id: chem_pump_hcl_ml_per_pulse
    optimistic: true
    restore_value: true
    min_value: 0.001
    max_value: 1.000
    step: 0.001
    initial_value: 0.050

button:
  - platform: restart
    name: "Hub Restart"

  - platform: template
    name: "Force Cloud Sync"
    on_press:
      - script.execute: cloud_sync

  - platform: template
    name: "Start Test KH"
    on_press:
      - script.execute: start_kh_test_remote

  - platform: template
    name: "Apply Chem Settings"
    on_press:
      - script.execute: apply_chem_settings

  - platform: template
    name: "Chem pH Cal Capture Liquid2"
    on_press:
      - script.execute: chem_ph_cal_capture_7

  - platform: template
    name: "Chem pH Cal Capture Liquid1"
    on_press:
      - script.execute: chem_ph_cal_capture_4

  - platform: template
    name: "Chem Pump Cal Run Sample"
    on_press:
      - script.execute: chem_pump_cal_run_sample

  - platform: template
    name: "Chem Pump Cal Run HCL"
    on_press:
      - script.execute: chem_pump_cal_run_hcl

  - platform: template
    name: "Chem Pump Cal Run Waste"
    on_press:
      - script.execute: chem_pump_cal_run_waste

  - platform: template
    name: "Chem Pump Cal Run RO"
    on_press:
      - script.execute: chem_pump_cal_run_ro

time:
  - platform: sntp
    id: sntp_time
    timezone: "Europe/Warsaw"
    servers:
      - pool.ntp.org
      - time.google.com
    on_time_sync:
      - logger.log: "Time synced"

script:
  - id: update_oled
    then:
      - component.update: oled_display

  - id: cloud_sync
    then:
      - logger.log: "Cloud sync starting..."
      - http_request.post:
          url: "https://reef-sentinel.com/api/integrations/webhook"
          request_headers:
            Content-Type: application/json
            X-API-Key: !secret reef_sentinel_api_key
          body: !lambda |-
            float ph = id(ph_value).state;
            float kh = id(kh_value).state;
            float ta = id(temp_aquarium).state;
            float ts = id(temp_sump).state;
            float ec = id(ec_value).state;
            if (isnan(ph)) ph = -1.0;
            if (isnan(kh)) kh = -1.0;
            if (isnan(ta)) ta = -1.0;
            if (isnan(ts)) ts = -1.0;
            if (isnan(ec)) ec = -1.0;
            char payload[320];
            snprintf(
              payload,
              sizeof(payload),
              "{\"tank_id\":\"%s\",\"ph\":%.2f,\"kh\":%.2f,\"temp_aquarium\":%.2f,\"temp_sump\":%.2f,\"ec\":%.2f,\"timestamp\":%lld}",
              "${tank_id}",
              ph,
              kh,
              ta,
              ts,
              ec,
              (long long) id(sntp_time).now().timestamp
            );
            return std::string(payload);
          on_response:
            then:
              - if:
                  condition:
                    lambda: "return response->status_code == 200;"
                  then:
                    - logger.log: "Cloud sync OK"
                  else:
                    - logger.log:
                        format: "Cloud sync FAILED: HTTP %d"
                        args: ["response->status_code"]

  - id: start_kh_test_remote
    then:
      - logger.log: "Sending KH test start command to Chem..."
      - http_request.post:
          url: "http://10.42.0.2/button/start_kh_test/press"
          request_headers:
            Content-Type: text/plain
      - logger.log: "KH start command sent"

  - id: apply_chem_settings
    then:
      - logger.log: "Pushing Chem settings from Hub..."
      - http_request.post:
          url: !lambda |-
            char u[128];
            snprintf(
              u,
              sizeof(u),
              "http://10.42.0.2/number/publish_interval_s/set?value=%d",
              (int) id(chem_publish_interval_s).state
            );
            return std::string(u);
      - http_request.post:
          url: !lambda |-
            char u[128];
            snprintf(
              u,
              sizeof(u),
              "http://10.42.0.2/number/kh_interval_h/set?value=%d",
              (int) id(chem_kh_interval_h).state
            );
            return std::string(u);
      - http_request.post:
          url: !lambda |-
            char u[128];
            snprintf(
              u,
              sizeof(u),
              "http://10.42.0.2/number/ph_cal_v4/set?value=%.3f",
              id(chem_ph_cal_v4).state
            );
            return std::string(u);
      - http_request.post:
          url: !lambda |-
            char u[128];
            snprintf(
              u,
              sizeof(u),
              "http://10.42.0.2/number/ph_cal_v7/set?value=%.3f",
              id(chem_ph_cal_v7).state
            );
            return std::string(u);
      - http_request.post:
          url: !lambda |-
            char u[128];
            snprintf(
              u,
              sizeof(u),
              "http://10.42.0.2/number/ph_cal_liquid1_ph/set?value=%.2f",
              id(chem_ph_cal_liquid1_ph).state
            );
            return std::string(u);
      - http_request.post:
          url: !lambda |-
            char u[128];
            snprintf(
              u,
              sizeof(u),
              "http://10.42.0.2/number/ph_cal_liquid2_ph/set?value=%.2f",
              id(chem_ph_cal_liquid2_ph).state
            );
            return std::string(u);
      - http_request.post:
          url: !lambda |-
            char u[128];
            snprintf(
              u,
              sizeof(u),
              "http://10.42.0.2/number/pump_cal_duration_s/set?value=%d",
              (int) id(chem_pump_cal_duration_s).state
            );
            return std::string(u);
      - http_request.post:
          url: !lambda |-
            char u[128];
            snprintf(
              u,
              sizeof(u),
              "http://10.42.0.2/number/pump_hcl_ml_per_pulse/set?value=%.3f",
              id(chem_pump_hcl_ml_per_pulse).state
            );
            return std::string(u);
      - logger.log: "Chem settings pushed"

  - id: chem_ph_cal_capture_7
    then:
      - logger.log: "Chem pH calibration capture for liquid2 requested..."
      - http_request.post:
          url: "http://10.42.0.2/button/ph_cal_capture_liquid2/press"
          request_headers:
            Content-Type: text/plain

  - id: chem_ph_cal_capture_4
    then:
      - logger.log: "Chem pH calibration capture for liquid1 requested..."
      - http_request.post:
          url: "http://10.42.0.2/button/ph_cal_capture_liquid1/press"
          request_headers:
            Content-Type: text/plain

  - id: chem_pump_cal_run_sample
    then:
      - logger.log: "Chem pump calibration run: sample"
      - http_request.post:
          url: "http://10.42.0.2/button/pump_cal_run_sample/press"
          request_headers:
            Content-Type: text/plain

  - id: chem_pump_cal_run_hcl
    then:
      - logger.log: "Chem pump calibration run: hcl"
      - http_request.post:
          url: "http://10.42.0.2/button/pump_cal_run_hcl/press"
          request_headers:
            Content-Type: text/plain

  - id: chem_pump_cal_run_waste
    then:
      - logger.log: "Chem pump calibration run: waste"
      - http_request.post:
          url: "http://10.42.0.2/button/pump_cal_run_waste/press"
          request_headers:
            Content-Type: text/plain

  - id: chem_pump_cal_run_ro
    then:
      - logger.log: "Chem pump calibration run: ro"
      - http_request.post:
          url: "http://10.42.0.2/button/pump_cal_run_ro/press"
          request_headers:
            Content-Type: text/plain

interval:
  - interval: 10s
    then:
      - script.execute: update_oled

  - interval: 15min
    then:
      - script.execute: cloud_sync

http_request:
  useragent: "sentinel-hub/1.1 ESPHome"
  timeout: 10s
  verify_ssl: true
